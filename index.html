<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaleb Anderson</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Click-to-enter gate ─────────────────────────────── */
    #intro {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.5s ease;
    }
    #intro.out { opacity: 0; pointer-events: none; }
    #intro span {
      color: rgba(255, 255, 255, 0.28);
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
    }

    #content {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
      opacity: 0;
      transition: opacity 1.4s ease;
      pointer-events: none;
    }
    #content.visible {
      opacity: 1;
      pointer-events: auto;
    }

    h1 {
      color: #fff;
      font-size: clamp(2rem, 6vw, 5rem);
      font-weight: 200;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    a.cta {
      display: inline-block;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.35);
      padding: 0.8em 2.5em;
      text-decoration: none;
      letter-spacing: 0.15em;
      font-size: 0.8rem;
      text-transform: uppercase;
      transition: background 0.3s, border-color 0.3s;
    }
    a.cta:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.8);
    }
  </style>
</head>
<body>

<div id="intro"><span>click to enter</span></div>
<canvas id="stage"></canvas>

<div id="content">
  <h1>Kaleb Anderson</h1>
  <a class="cta" href="https://www.linkedin.com/in/educloud" target="_blank" rel="noopener">LinkedIn ↗</a>
</div>

<script>
  const canvas  = document.getElementById('stage');
  const ctx     = canvas.getContext('2d');
  const content = document.getElementById('content');
  const intro   = document.getElementById('intro');

  // ── ASU Brand Palette ─────────────────────────────────────────
  const PALETTE = [
    { fill: '#8C1D40', glow: '#C42858' },  // Maroon
    { fill: '#FFC627', glow: '#FFD966' },  // Gold
    { fill: '#FF7F32', glow: '#FFA060' },  // Orange
  ];
  const STROBE = { fill: '#FFFFFF', glow: '#FFFFFF' };

  // ── Layout config ─────────────────────────────────────────────
  const NUM_BARS    = 14;
  const NUM_SEGS    = 32;
  const BAR_W_RATIO = 0.022;
  const SEG_GAP     = 3;
  const CORNER_R    = 3;

  // ── Phase durations (ms) ──────────────────────────────────────
  const T_DARK    =  400;   // pure black
  const T_WAKING  = 3200;   // sparse quiet random pops
  const T_HOUSE   =  450;   // all bars snap to white — "house lights on"
  const T_FADEOUT = 1200;   // white fades top→bottom, name appears
  const T_TOTAL   = T_DARK + T_WAKING + T_HOUSE + T_FADEOUT;

  let startTime = null;
  let bars      = [];
  let twinkling = false;

  function initBars() {
    bars = [];
    for (let i = 0; i < NUM_BARS; i++) {
      bars.push({
        segments: Array.from({ length: NUM_SEGS }, () => ({
          colorIdx:      Math.floor(Math.random() * PALETTE.length),
          wakePhase:     Math.random() * Math.PI * 2,
          wakeSpeed:     0.0005 + Math.random() * 0.0008,
          wakeThresh:    0.80   + Math.random() * 0.18,
          twinklePhase:  Math.random() * Math.PI * 2,
          twinkleSpeed:  0.0003 + Math.random() * 0.0006,  // slower than waking
          twinkleThresh: 0.82   + Math.random() * 0.16,    // very sparse
        })),
      });
    }
  }

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();
  initBars();

  function rrect(x, y, w, h, r) {
    if (typeof ctx.roundRect === 'function') {
      ctx.beginPath(); ctx.roundRect(x, y, w, h, r);
    } else {
      ctx.beginPath();
      ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y,     x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x,     y + h, x,     y + h - r);
      ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }
  }

  function drawLit(barX, segY, barW, segH, color, intensity) {
    ctx.save();
    ctx.shadowBlur  = 6 + intensity * 24;
    ctx.shadowColor = color.glow;
    ctx.fillStyle   = color.fill;
    rrect(barX, segY, barW, Math.max(2, segH), CORNER_R);
    ctx.fill();
    ctx.restore();
  }

  function draw(ts) {
    if (!startTime) startTime = ts;
    const t = ts - startTime;

    const W = canvas.width;
    const H = canvas.height;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    let phase, phaseT;
    if (t < T_DARK) {
      phase = 'dark';    phaseT = t / T_DARK;
    } else if (t < T_DARK + T_WAKING) {
      phase = 'waking';  phaseT = (t - T_DARK) / T_WAKING;
    } else if (t < T_DARK + T_WAKING + T_HOUSE) {
      phase = 'house';   phaseT = (t - T_DARK - T_WAKING) / T_HOUSE;
    } else if (t < T_TOTAL) {
      phase = 'fadeout'; phaseT = (t - T_DARK - T_WAKING - T_HOUSE) / T_FADEOUT;
    } else {
      phase = 'done';    phaseT = 1;
    }

    const barW  = Math.max(8, W * BAR_W_RATIO);
    const slotW = W / NUM_BARS;
    const segH  = (H - SEG_GAP * (NUM_SEGS + 1)) / NUM_SEGS;

    for (let bi = 0; bi < NUM_BARS; bi++) {
      const bar  = bars[bi];
      const barX = slotW * bi + (slotW - barW) / 2;

      for (let si = 0; si < NUM_SEGS; si++) {
        const seg  = bar.segments[si];
        const segY = SEG_GAP + si * (segH + SEG_GAP);
        let intensity = 0;
        let color     = PALETTE[seg.colorIdx];

        if (phase === 'dark') {
          intensity = 0;
        } else if (phase === 'waking') {
          // White-only, sparse, half brightness
          color = STROBE;
          const osc = Math.sin(t * seg.wakeSpeed + seg.wakePhase);
          if (osc > seg.wakeThresh) {
            intensity = ((osc - seg.wakeThresh) / (1 - seg.wakeThresh)) * 0.5;
          }
        } else if (phase === 'house') {
          color = STROBE; intensity = 1.0;
        } else if (phase === 'fadeout') {
          color = STROBE;
          const fadeStart = (si / NUM_SEGS) * 0.4;
          intensity = Math.max(0, 1 - (phaseT - fadeStart) * 3.0);
        } else if (phase === 'done' && twinkling) {
          color = STROBE;
          const osc = Math.sin(t * seg.twinkleSpeed + seg.twinklePhase);
          if (osc > seg.twinkleThresh) {
            intensity = ((osc - seg.twinkleThresh) / (1 - seg.twinkleThresh)) * 0.5;
          }
        }

        if (intensity > 0.01) {
          drawLit(barX, segY, barW, segH, color, intensity);
        } else if (phase !== 'done') {
          ctx.fillStyle = '#080808';
          rrect(barX, segY, barW, Math.max(2, segH), CORNER_R);
          ctx.fill();
        }
      }
    }

    if (phase === 'fadeout' && phaseT > 0.35 && !content.classList.contains('visible')) {
      content.classList.add('visible');
    }

    if (phase !== 'done' || twinkling) {
      requestAnimationFrame(draw);
    }
  }

  // ── Audio: real jazz track ────────────────────────────────────
  function startAudio() {
    const audio = new Audio('abydos_music-jazzy-lounge-cafe-182992.mp3');
    audio.currentTime = 1;   // skip 1s into track
    audio.volume = 0;
    audio.play();

    // Fade in over ~2.5s
    const fadeInId = setInterval(() => {
      audio.volume = Math.min(0.8, audio.volume + 0.016);
      if (audio.volume >= 0.8) clearInterval(fadeInId);
    }, 50);

    // Twinkling starts ~5s after the name reveal
    const revealAt = T_DARK + T_WAKING + T_HOUSE + T_FADEOUT * 0.35;
    setTimeout(() => { twinkling = true; requestAnimationFrame(draw); }, revealAt + 5000);

    // Fade out music at 30s, stop twinkling when silence hits
    setTimeout(() => {
      const fadeOutId = setInterval(() => {
        audio.volume = Math.max(0, audio.volume - 0.03);
        if (audio.volume === 0) {
          clearInterval(fadeOutId);
          audio.pause();
          twinkling = false;
        }
      }, 50);
    }, 30000);
  }

  // ── Entry point ───────────────────────────────────────────────
  function enter() {
    intro.classList.add('out');
    setTimeout(() => intro.remove(), 500);
    startAudio();
    requestAnimationFrame(draw);
  }

  intro.addEventListener('click', enter);
</script>
</body>
</html>
